name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-build:
    name: Swift Build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Build
        run: swift build -c release
